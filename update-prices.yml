name: Update Monitor prices

on:
  schedule:
    - cron: '0 6 * * *'      # every day at 06:00 UTC
  workflow_dispatch:          # adds a "Run workflow" button for the first fetch

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest prices
        run: node fetch-prices.mjs

      - name: Commit data.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No price changes."
          else
            git commit -m "Update prices ($(date -u +%Y-%m-%d))"
            git push
          fi
